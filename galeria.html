<!DOCTYPE html>
<html lang="pt-BR" class="galeria-html">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Nossa Galeria</title>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="js/desktop-block.js"></script>
</head>
<body class="galeria-body">

    <header class="galeria-header">
        <a href="index.html" class="voltar-link"><i class="bi bi-arrow-left"></i> voltar</a>
        <svg class="galeria-girassol" viewBox="0 0 100 100" aria-hidden="true">
            <circle cx="50" cy="50" r="14" fill="#7a5b1e"/>
            <g fill="#F4C430">
                <ellipse cx="50" cy="18" rx="9" ry="16"/><ellipse cx="50" cy="82" rx="9" ry="16"/>
                <ellipse cx="18" cy="50" rx="16" ry="9"/><ellipse cx="82" cy="50" rx="16" ry="9"/>
                <ellipse cx="27" cy="27" rx="9" ry="16" transform="rotate(45 27 27)"/><ellipse cx="73" cy="73" rx="9" ry="16" transform="rotate(45 73 73)"/>
                <ellipse cx="73" cy="27" rx="9" ry="16" transform="rotate(-45 73 27)"/><ellipse cx="27" cy="73" rx="9" ry="16" transform="rotate(-45 27 73)"/>
            </g>
        </svg>
        <p class="galeria-eyebrow">Nosso álbum</p>
        <h1 class="galeria-titulo">Nossa Galeria</h1>
        <p class="galeria-sub">Pedacinhos da nossa história, guardados aqui para sempre. Um álbum que vai crescer com a gente, ano após ano.</p>
    </header>

    <main class="galeria-wrap">
        <div class="galeria-masonry" id="galeriaMasonry"></div>
        <p class="galeria-vazio d-none" id="galeriaVazio">Este álbum ainda está esperando as primeiras fotos. Em breve, vai se encher de nós.</p>
    </main>

    <div class="galeria-lightbox" id="galeriaLightbox">
        <button class="galeria-lightbox-close" id="galeriaLightboxClose" aria-label="Fechar">&times;</button>
        <div class="text-center">
            <img id="galeriaLightboxImg" src="" alt="Foto ampliada">
            <p class="galeria-legenda" id="galeriaLightboxLegenda"></p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/galeria.js"></script>
</body>
</html>
